<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Charades Engine</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import map to resolve React JSX runtime dependencies generated by Babel -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #07051a;
      color: #f8f7ff;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    .app-bg {
      min-height: 100vh;
      background: #07051a;
      background-image:
        radial-gradient(ellipse 140% 60% at 50% -5%, rgba(88,28,180,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(20,184,166,0.06) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .font-display { font-family: 'Space Grotesk', sans-serif; }

    /* Glassmorphism */
    .glass {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    
    .glass-strong {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .glass-hover { transition: background 0.2s, border-color 0.2s, transform 0.2s; }
    .glass-hover:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }
    .glass-hover:active { transform: scale(0.97); }

    /* Custom Scrollbar */
    .scroll-none { -ms-overflow-style: none; scrollbar-width: none; }
    .scroll-none::-webkit-scrollbar { display: none; }

    /* Animations */
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); } 50% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.6); } }
    @keyframes badgePop { 0%{transform:scale(0);opacity:0} 65%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

    .anim-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .anim-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .anim-pulse-glow { animation: pulseGlow 2s infinite; }
    .anim-badge-pop { animation: badgePop .35s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* Focus States */
    button:focus-visible, input:focus-visible {
      outline: 2px solid rgba(245,158,11,.65);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    const FILTER_CONFIG = {
      difficulty: [
        { id: 'easy', label: 'Easy', icon: '🟢' },
        { id: 'medium', label: 'Medium', icon: '🟡' },
        { id: 'hard', label: 'Hard', icon: '🔴' },
        { id: 'impossible', label: 'Impossible', icon: '💀' }
      ],
      industry: [
        { id: 'bollywood', label: 'Bollywood', icon: '🎬' },
        { id: 'hollywood', label: 'Hollywood', icon: '⭐' },
        { id: 'series', label: 'Web Series', icon: '📺' },
        { id: 'regional', label: 'Pan-Indian', icon: '🌶️' },
        { id: 'animated', label: 'Animated/Anime', icon: '🎨' }
      ],
      era: [
        { id: 'recent', label: 'Recent (2020s)', icon: '🔥' },
        { id: '2010s', label: '2010s', icon: '📱' },
        { id: '2000s', label: '2000s', icon: '💿' },
        { id: '90s', label: '90s Gold', icon: '📼' },
        { id: 'classic', label: 'Classics', icon: '🎞️' }
      ]
    };

    const apiKey = ""; // Environment provided API key

    async function fetchWithRetry(url, options, maxRetries = 3) {
      const delays = [1000, 2500, 5000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
          return await res.json();
        } catch (err) {
          if (i === maxRetries - 1) throw err;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    }

    async function generateCharadesMovie(filters) {
      const systemInstruction = `You are a party game assistant generating movies for Dumb Charades.
The user will provide filters (Difficulty, Industry, Era).
Return a SINGLE movie or series that perfectly matches these filters and is fun to act out.

Your response MUST be raw JSON adhering to this schema:
{
  "title": "Movie Title Here",
  "word_count": 4,
  "year": 2011,
  "language": "English or Hindi etc",
  "hint": "A 1-sentence spoiler-free plot summary for context.",
  "action_tip": "A short, fun tip on how to start acting this out (e.g., 'Act like you are driving a car')."
}`;

      const userPrompt = `Give me a Dumb Charades prompt. 
Filters applied: 
- Difficulty: ${filters.difficulty}
- Industry: ${filters.industry}
- Era: ${filters.era}`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: userPrompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          temperature: 0.9 // Higher temp for more variety
        }
      };

      const data = await fetchWithRetry(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("Invalid response");
      return JSON.parse(text);
    }

    
    // Filter Selection Pill (Antakshari Style)
    function FilterPill({ item, isActive, onClick }) {
      return (
        <button
          onClick={() => onClick(item.id)}
          className="font-display"
          style={{
            flexShrink:0, padding:'8px 16px', borderRadius:14,
            fontSize:13, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap',
            transition:'all .18s', display: 'flex', alignItems: 'center', gap: '6px',
            background: isActive ? '#f59e0b' : 'rgba(255,255,255,.055)',
            color:      isActive ? '#1a0f00' : 'rgba(255,255,255,.65)',
            border:     isActive ? '1px solid #f59e0b' : '1px solid rgba(255,255,255,.10)',
            boxShadow:  isActive ? '0 4px 18px rgba(245,158,11,.25)' : 'none',
          }}
        >
          <span>{item.icon}</span>
          {item.label}
        </button>
      );
    }

    // 60 Second Countdown Timer
    function CountdownTimer({ onTimeUp, isRunning }) {
      const [timeLeft, setTimeLeft] = useState(60);
      
      useEffect(() => {
        let timer;
        if (isRunning && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (timeLeft === 0) {
          onTimeUp();
        }
        return () => clearInterval(timer);
      }, [isRunning, timeLeft, onTimeUp]);

      const percentage = (timeLeft / 60) * 100;
      const colorClass = timeLeft > 30 ? 'bg-emerald-400' : timeLeft > 10 ? 'bg-amber-400' : 'bg-rose-500';

      return (
        <div className="w-full mt-4">
          <div className="flex justify-between items-center mb-2 font-display">
            <span className="text-white/60 text-xs font-bold tracking-widest uppercase">Time Remaining</span>
            <span className={`text-xl font-bold ${timeLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-white'}`}>
              00:{timeLeft.toString().padStart(2, '0')}
            </span>
          </div>
          <div className="h-2 w-full glass rounded-full overflow-hidden">
            <div 
              className={`h-full ${colorClass} transition-all duration-1000 ease-linear rounded-full`}
              style={{ width: `${percentage}%` }}
            />
          </div>
        </div>
      );
    }

    function App() {
      // States: 'team_setup', 'turn_intro', 'setup', 'loading', 'revealed', 'playing'
      const [appState, setAppState] = useState('team_setup');
      
      // Teams & Scoring
      const [teams, setTeams] = useState([
        { id: 1, name: 'Team A', score: 0 },
        { id: 2, name: 'Team B', score: 0 }
      ]);
      const [newTeamName, setNewTeamName] = useState('');
      const [currentTeamIndex, setCurrentTeamIndex] = useState(0);

      // Game Data
      const [filters, setFilters] = useState({
        difficulty: 'medium',
        industry: 'bollywood',
        era: 'recent'
      });
      const [movie, setMovie] = useState(null);
      const [error, setError] = useState('');

      // Team Management
      const addTeam = (e) => {
        e.preventDefault();
        if (!newTeamName.trim()) return;
        setTeams([...teams, { id: Date.now(), name: newTeamName.trim(), score: 0 }]);
        setNewTeamName('');
      };

      const removeTeam = (id) => {
        setTeams(teams.filter(t => t.id !== id));
      };

      const startGame = () => {
        if (teams.length < 2) return;
        setAppState('turn_intro');
        setCurrentTeamIndex(0);
        if (navigator.vibrate) navigator.vibrate(20);
      };

      // Game Flow
      const handleFilterChange = (category, id) => {
        setFilters(prev => ({ ...prev, [category]: id }));
        if (navigator.vibrate) navigator.vibrate(10);
      };

      const handleGenerate = async () => {
        setAppState('loading');
        setError('');
        if (navigator.vibrate) navigator.vibrate(20);
        
        try {
          const result = await generateCharadesMovie(filters);
          setMovie(result);
          setAppState('revealed');
        } catch (err) {
          console.error(err);
          setError('Failed to fetch a movie. Try again!');
          setAppState('setup');
        }
      };

      const startTimer = () => {
        setAppState('playing');
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
      };

      const endTurn = (success) => {
        // Update Score
        if (success) {
          const updatedTeams = [...teams];
          updatedTeams[currentTeamIndex].score += 1;
          setTeams(updatedTeams);
        }
        
        if (navigator.vibrate) navigator.vibrate(success ? [50, 50, 50] : [100]);
        
        // Advance Turn
        setCurrentTeamIndex((prev) => (prev + 1) % teams.length);
        setMovie(null);
        setAppState('turn_intro');
      };

      const currentTeam = teams[currentTeamIndex];

      return (
        <div className="app-bg flex justify-center">
          
          {/* Main Mobile Container */}
          <div className="w-full max-w-[540px] min-h-[100dvh] flex flex-col p-5 relative">
            
            {/* Header & Live Scoreboard (Visible if not in team setup) */}
            {appState !== 'team_setup' && (
              <header className="mb-6 flex-shrink-0 anim-fade-in">
                <div className="flex justify-between items-end mb-4">
                  <div>
                    <h1 className="font-display text-3xl font-bold tracking-tight text-white mb-1">
                      Charades<span className="text-[#f59e0b]">.</span>
                    </h1>
                    <p className="text-[#14b8a6] text-[10px] font-bold tracking-[0.2em] uppercase">AI Party Engine</p>
                  </div>
                </div>
                
                {/* Horizontal Scrolling Scoreboard */}
                <div className="flex gap-2 overflow-x-auto scroll-none pb-2">
                  {teams.map((t, i) => (
                    <div 
                      key={t.id} 
                      className={`glass px-4 py-2 rounded-xl flex flex-col items-center min-w-[80px] transition-all duration-300 ${
                        i === currentTeamIndex 
                          ? 'border-[#f59e0b] shadow-[0_0_15px_rgba(245,158,11,0.2)] bg-white/10' 
                          : 'opacity-60'
                      }`}
                    >
                      <span className="text-[10px] font-bold uppercase tracking-wider text-white/50 mb-1 truncate w-full text-center">{t.name}</span>
                      <span className="font-display font-bold text-2xl leading-none text-[#f59e0b]">{t.score}</span>
                    </div>
                  ))}
                </div>
              </header>
            )}

            {/* View State: TEAM SETUP */}
            {appState === 'team_setup' && (
              <div className="flex-1 flex flex-col pt-10 anim-fade-in">
                <div className="text-center mb-10">
                  <h1 className="font-display text-5xl font-bold tracking-tight text-white mb-2 text-shadow-glow">
                    Charades<span className="text-[#f59e0b]">.</span>
                  </h1>
                  <p className="text-[#14b8a6] text-xs font-bold tracking-[0.2em] uppercase">AI Party Engine</p>
                </div>

                <div className="glass rounded-2xl p-6 mb-6">
                  <p className="font-display text-[10px] tracking-[0.2em] text-white/50 uppercase font-bold mb-4">Create Teams</p>
                  
                  <form onSubmit={addTeam} className="flex gap-2 mb-6">
                    <input 
                      type="text" 
                      value={newTeamName}
                      onChange={(e) => setNewTeamName(e.target.value)}
                      placeholder="Enter team name..."
                      className="flex-1 glass bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white font-display focus:outline-none focus:border-[#f59e0b] transition-colors"
                      maxLength={15}
                    />
                    <button 
                      type="submit"
                      disabled={!newTeamName.trim()}
                      className="glass-hover bg-white/10 px-5 rounded-xl font-display font-bold text-[#f59e0b] disabled:opacity-50 disabled:text-white/30"
                    >
                      Add
                    </button>
                  </form>

                  <div className="flex flex-col gap-2">
                    {teams.map((t, i) => (
                      <div key={t.id} className="flex justify-between items-center glass px-4 py-3 rounded-xl anim-badge-pop" style={{animationDelay: `${i*0.05}s`}}>
                        <span className="font-display font-bold text-white">{t.name}</span>
                        <button onClick={() => removeTeam(t.id)} className="text-white/30 hover:text-rose-400 text-sm font-bold transition-colors">
                          ✕
                        </button>
                      </div>
                    ))}
                    {teams.length === 0 && <p className="text-white/30 text-sm text-center py-4">No teams added yet.</p>}
                  </div>
                </div>

                <div className="mt-auto flex-shrink-0 pt-4">
                  <button 
                    onClick={startGame}
                    disabled={teams.length < 2}
                    className="w-full font-display text-lg font-bold py-4 rounded-2xl bg-[#f59e0b] text-[#1a0f00] shadow-[0_0_20px_rgba(245,158,11,0.3)] disabled:opacity-50 disabled:shadow-none transition-all active:scale-95"
                  >
                    {teams.length < 2 ? 'Need at least 2 teams' : 'Start Playing'}
                  </button>
                </div>
              </div>
            )}

            {/* View State: TURN INTRO */}
            {appState === 'turn_intro' && currentTeam && (
              <div className="flex-1 flex flex-col items-center justify-center anim-slide-up text-center">
                <div className="glass w-full rounded-3xl p-10 flex flex-col items-center shadow-2xl relative overflow-hidden">
                  {/* Decorative blur */}
                  <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-[#f59e0b]/20 blur-[50px] rounded-full pointer-events-none"></div>

                  <span className="text-[#14b8a6] text-[10px] font-bold tracking-[0.2em] uppercase mb-4">Get Ready</span>
                  <h2 className="font-display text-4xl sm:text-5xl font-bold text-white mb-2 text-shadow-glow">
                    {currentTeam.name}'s Turn
                  </h2>
                  <p className="text-white/50 text-sm mb-10 max-w-[250px]">
                    Hand the phone to the actor for this round. They will select the prompt.
                  </p>

                  <button 
                    onClick={() => setAppState('setup')}
                    className="w-full font-display text-lg font-bold py-4 rounded-2xl bg-white text-[#1a0f00] shadow-[0_0_20px_rgba(255,255,255,0.2)] active:scale-95 transition-all"
                  >
                    We're Ready
                  </button>
                </div>
              </div>
            )}

            {/* View State: SETUP (Filters) */}
            {appState === 'setup' && (
              <div className="flex-1 flex flex-col gap-6 anim-fade-in">
                
                {error && (
                  <div className="bg-rose-500/20 border border-rose-500/50 text-rose-200 p-3 rounded-2xl text-sm font-medium text-center">
                    {error}
                  </div>
                )}

                <div className="flex flex-col gap-6 flex-grow">
                  {Object.entries(FILTER_CONFIG).map(([category, items]) => (
                    <div key={category} className="glass rounded-2xl p-4">
                      <p className="font-display text-[10px] tracking-[0.2em] text-white/40 uppercase font-bold mb-3 ml-1">
                        Select {category}
                      </p>
                      <div className="flex overflow-x-auto scroll-none gap-2 pb-2 -mx-4 px-4">
                        {items.map(item => (
                          <FilterPill 
                            key={item.id} 
                            item={item} 
                            isActive={filters[category] === item.id}
                            onClick={(id) => handleFilterChange(category, id)}
                          />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="mt-auto pt-4 flex-shrink-0">
                  <button 
                    onClick={handleGenerate}
                    className="w-full font-display text-lg font-bold py-4 rounded-2xl bg-[#f59e0b] text-[#1a0f00] shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:shadow-[0_0_30px_rgba(245,158,11,0.5)] transition-all active:scale-95 flex items-center justify-center gap-2"
                  >
                    🎲 Generate Movie
                  </button>
                </div>
              </div>
            )}

            {/* View State: LOADING */}
            {appState === 'loading' && (
              <div className="flex-1 flex flex-col items-center justify-center anim-fade-in">
                <div className="w-20 h-20 relative">
                  <div className="absolute inset-0 border-4 border-white/10 rounded-full"></div>
                  <div className="absolute inset-0 border-4 border-[#f59e0b] rounded-full border-t-transparent animate-spin"></div>
                </div>
                <h2 className="font-display mt-6 text-xl font-bold text-white">Consulting the Directors...</h2>
                <p className="text-white/40 text-sm mt-2">Finding the perfect prompt.</p>
              </div>
            )}

            {/* View State: REVEALED & PLAYING */}
            {(appState === 'revealed' || appState === 'playing') && movie && (
              <div className="flex-1 flex flex-col anim-slide-up">
                
                {/* Movie Card */}
                <div className="glass acc-0 rounded-[2rem] p-6 sm:p-8 relative overflow-hidden flex-shrink-0 shadow-2xl">
                  {/* Decorative background blur inside card */}
                  <div className="absolute -top-20 -right-20 w-40 h-40 bg-[#f59e0b]/10 blur-[50px] rounded-full pointer-events-none"></div>
                  
                  <div className="relative z-10">
                    <div className="flex justify-between items-start mb-4">
                      <span className="glass px-3 py-1 rounded-lg text-xs font-bold text-[#f59e0b] uppercase tracking-wider font-display border-[#f59e0b]/30 bg-[#f59e0b]/10">
                        {filters.difficulty}
                      </span>
                      <span className="bg-white/10 text-white font-display font-bold px-3 py-1 rounded-lg text-xs">
                        {movie.year}
                      </span>
                    </div>

                    <h2 className="font-display text-4xl sm:text-5xl font-bold text-white leading-tight mb-2 break-words">
                      {movie.title}
                    </h2>
                    
                    <div className="flex items-center gap-3 mb-6">
                      <div className="bg-[#14b8a6]/10 border border-[#14b8a6]/30 text-[#14b8a6] font-bold px-3 py-1.5 rounded-xl text-sm flex items-center gap-2 font-display">
                        <span>{movie.word_count} Words</span>
                      </div>
                      <span className="text-white/40 text-sm">{movie.language}</span>
                    </div>

                    <div className="space-y-4">
                      <div className="bg-black/30 p-4 rounded-2xl border border-white/5">
                        <span className="text-white/30 text-[10px] font-bold tracking-widest uppercase block mb-1">Plot Hint</span>
                        <p className="text-white/80 text-sm leading-relaxed">{movie.hint}</p>
                      </div>

                      <div className="bg-[#f43f5e]/10 p-4 rounded-2xl border border-[#f43f5e]/20">
                        <span className="text-[#f43f5e]/70 text-[10px] font-bold tracking-widest uppercase block mb-1">Action Tip</span>
                        <p className="text-[#f43f5e] text-sm leading-relaxed">{movie.action_tip}</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Game Actions area */}
                <div className="mt-auto pt-6 flex flex-col gap-4">
                  
                  {appState === 'revealed' ? (
                    <div className="text-center anim-fade-in">
                      <p className="text-white/50 text-sm mb-4 font-medium">Memorize this. Don't show your team!</p>
                      <button 
                        onClick={startTimer}
                        className="w-full font-display text-lg font-bold py-4 rounded-2xl bg-[#f59e0b] text-[#1a0f00] shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:shadow-[0_0_30px_rgba(245,158,11,0.5)] transition-all active:scale-95 anim-pulse-glow"
                      >
                        Start 60s Timer
                      </button>
                      <button 
                        onClick={() => setAppState('setup')}
                        className="mt-4 text-white/30 text-sm font-semibold py-2 hover:text-white transition-colors"
                      >
                        ← Back to filters
                      </button>
                    </div>
                  ) : (
                    <div className="anim-fade-in flex flex-col gap-6">
                      <CountdownTimer isRunning={true} onTimeUp={() => endTurn(false)} />
                      
                      <div className="flex gap-3">
                        <button 
                          onClick={() => endTurn(false)}
                          className="flex-1 glass glass-hover font-display text-white/70 font-bold py-4 rounded-2xl active:bg-white/10 transition-colors"
                        >
                          Pass ⏭️
                        </button>
                        <button 
                          onClick={() => endTurn(true)}
                          className="flex-[2] font-display text-[#1a0f00] bg-[#14b8a6] font-bold py-4 rounded-2xl shadow-[0_0_20px_rgba(20,184,166,0.3)] active:scale-95 transition-all"
                        >
                          Guessed It! 🎉
                        </button>
                      </div>
                    </div>
                  )}
                </div>
                
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
