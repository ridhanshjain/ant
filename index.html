<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Antakshari Engine</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import map to resolve React JSX runtime dependencies generated by Babel -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #07051a;
      color: #f8f7ff;
      min-height: 100vh;
    }

    .app-bg {
      min-height: 100vh;
      background: #07051a;
      background-image:
        radial-gradient(ellipse 140% 60% at 50% -5%, rgba(88,28,180,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(20,184,166,0.06) 0%, transparent 50%);
    }

    .font-display { font-family: 'Space Grotesk', sans-serif; }

    /* Glass */
    .glass {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .glass-hover { transition: background 0.2s, border-color 0.2s; }
    .glass-hover:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }

    /* Vinyl disc */
    .vinyl-disc {
      background: conic-gradient(
        from 0deg,
        #12102a 0%, #0a091f 8%,
        #12102a 16%, #0a091f 24%,
        #12102a 32%, #0a091f 40%,
        #12102a 48%, #0a091f 56%,
        #12102a 64%, #0a091f 72%,
        #12102a 80%, #0a091f 88%,
        #12102a 96%, #0a091f 100%
      );
    }

    /* Animations */
    @keyframes spinSlow   { to { transform: rotate(360deg);  } }
    @keyframes spinFast   { to { transform: rotate(360deg);  } }
    @keyframes slideUp    { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes shimmer    { 0%{background-position:-500px 0} 100%{background-position:500px 0} }
    @keyframes noteFloat  { 0%{opacity:.9;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(.5)} }
    @keyframes glowBlink  { 0%,100%{color:#f43f5e;text-shadow:0 0 8px rgba(244,63,94,.6)} 50%{color:#fb7185;text-shadow:0 0 22px rgba(244,63,94,1)} }
    @keyframes badgePop   { 0%{transform:scale(0);opacity:0} 65%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
    @keyframes ringPulse  { 0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.55),0 0 22px rgba(245,158,11,.2)} 50%{box-shadow:0 0 0 4px rgba(245,158,11,.9),0 0 44px rgba(245,158,11,.40)} }
    @keyframes usedFlash  { 0%{background:rgba(245,158,11,.4)} 100%{background:rgba(245,158,11,.12)} }

    .anim-spin-slow  { animation: spinSlow 14s linear infinite; }
    .anim-spin-fast  { animation: spinFast .85s linear infinite; }
    .anim-slide-up   { animation: slideUp .42s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
    .anim-fade-in    { animation: fadeIn .3s ease-out forwards; }
    .anim-glow-blink { animation: glowBlink 2.2s ease-in-out infinite; }
    .anim-badge-pop  { animation: badgePop .35s cubic-bezier(.34,1.56,.64,1) forwards; }
    .anim-ring-pulse { animation: ringPulse 2.6s ease-in-out infinite; }
    .anim-note-float { animation: noteFloat 2.1s ease-out forwards; }
    .anim-used-flash { animation: usedFlash .5s ease-out forwards; }

    .shimmer-block {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.04) 100%);
      background-size: 500px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    /* Scrollbars */
    .scroll-none { -ms-overflow-style:none; scrollbar-width:none; }
    .scroll-none::-webkit-scrollbar { display:none; }
    .scroll-thin { scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.15) transparent; }
    .scroll-thin::-webkit-scrollbar { width:4px; }
    .scroll-thin::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:4px; }

    /* Accent left-borders */
    .acc-0 { border-left:3px solid #f59e0b; }
    .acc-1 { border-left:3px solid #f43f5e; }
    .acc-2 { border-left:3px solid #8b5cf6; }
    .acc-3 { border-left:3px solid #14b8a6; }
    .acc-4 { border-left:3px solid #3b82f6; }

    /* Keyboard focus */
    button:focus-visible, input:focus-visible {
      outline: 2px solid rgba(245,158,11,.65);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Constants ─────────────────────────────────────────────────────────── */

    const FILTERS = [
      { id:'all',        label:'✦ All Songs'      },
      { id:'bollywood',  label:'🎬 Bollywood'      },
      { id:'90s',        label:'📼 90s Hits'       },
      { id:'rahman',     label:'🎹 A.R. Rahman'    },
      { id:'sufi',       label:'🌙 Sufi & Ghazal'  },
      { id:'devotional', label:'🕉 Devotional'     },
      { id:'punjabi',    label:'🥁 Punjabi'        },
      { id:'english',    label:'🌍 English'        },
      { id:'retro',      label:'🎤 Retro Golden'   },
      { id:'south',      label:'🎸 South Indian'   },
    ];

    const QUICK_ALPHA = 'ABCDEFGHIJKLMNOPRSTUVYZ'.split('');
    const DIGRAPHS    = ['SH','KH','BH','DH','GH','PH','TR','PR','BR','CH'];

    const ACCENT_META = [
      { color:'#f59e0b', bg:'rgba(245,158,11,.12)' },
      { color:'#f43f5e', bg:'rgba(244,63,94,.12)'  },
      { color:'#8b5cf6', bg:'rgba(139,92,246,.12)' },
      { color:'#14b8a6', bg:'rgba(20,184,166,.12)' },
      { color:'#3b82f6', bg:'rgba(59,130,246,.12)' },
    ];

    /* ─── API Integration (Gemini) ───────────────────────────────────────────── */

    const apiKey = ""; // Provided automatically by the environment
    
    const FILTER_DESC = {
      all:        'any genre — mix of classic, 90s, and modern Indian songs',
      bollywood:  'popular mainstream Bollywood Hindi film songs',
      '90s':      'Bollywood Hindi film songs from 1990–1999 only',
      rahman:     'songs composed by A.R. Rahman (any film or year)',
      sufi:       'Sufi, Qawwali, Ghazal, or spiritually lyrical songs',
      devotional: 'devotional songs — bhajans, aartis, stotras, naats, kirtans',
      punjabi:    'Punjabi language songs — pop, folk, or Punjabi Bollywood',
      english:    'English language songs — pop, rock, or R&B',
      retro:      'classic Bollywood golden era from the 1950s to 1980s',
      south:      'South Indian film songs — Tamil, Telugu, or Kannada',
    };

    async function fetchWithRetry(url, options, maxRetries = 5) {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
          return await res.json();
        } catch (err) {
          if (i === maxRetries - 1) throw err;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    }

    async function callGeminiForSongs(sound, filter) {
      const desc = FILTER_DESC[filter] || 'any genre';

      const systemInstruction = `You are an expert Antakshari game assistant with encyclopedic knowledge of world music.
PHONETIC MATCHING RULES — match the FIRST SOUND, not first spelling:
• SH → Shayad, Sheila Ki Jawani, Sham, Shola Jo Bhadke
• KH → Khwaja Mere Khwaja, Khuda Jaane, Khwaab Dekhe
• BH → Bheegi Bheegi, Bhool Bhulaiya, Bhar Do Jholi
• DH → Dhadak, Dhoom Machale, Dhol Bajne Laga
• GH → Ghoomar, Ghungroo, Ghazab Ka Hai Din
• CH → Channa Mereya, Chaiyya Chaiyya, Choli Ke Peeche
• TR → Trishul, Tribute, Trishna
• Single A → Agar Tum Saath Ho, Ae Dil Hai Mushkil, Ajeeb Dastan
• All songs MUST actually exist and be recognisable.

IMPORTANT: You MUST provide the ENTIRE, COMPLETE lyrics of the song from start to finish. Do not truncate. Do not provide just a few lines. Provide the FULL song.`;

      const userPrompt = `Return 6 real, recognisable songs for Antakshari where each title STARTS WITH the sound: "${sound.toUpperCase()}". Genre required: ${desc}.`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: userPrompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              songs: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    title: { type: "STRING" },
                    movie: { type: "STRING" },
                    singer: { type: "STRING" },
                    language: { type: "STRING" },
                    era: { type: "STRING" },
                    lyrics: { type: "ARRAY", items: { type: "STRING" } },
                    end_letter: { type: "STRING" }
                  },
                  required: ["title", "movie", "singer", "language", "era", "lyrics", "end_letter"]
                }
              }
            },
            required: ["songs"]
          }
        }
      };

      const data = await fetchWithRetry(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("Invalid response format from Gemini");
      
      return JSON.parse(text);
    }

    /* ─── Sub-components ─────────────────────────────────────────────────────── */

    function NoteParticles({ triggerKey }) {
      const [ps, setPs] = useState([]);
      const NOTES = ['♪','♫','♬','♩','🎵','🎶'];
      useEffect(() => {
        if (!triggerKey) return;
        const newPs = Array.from({length:8}, (_,i) => ({
          id: Date.now()+i,
          ch:    NOTES[Math.floor(Math.random()*NOTES.length)],
          x:     10 + Math.random()*80,
          delay: i * 0.13,
          size:  12 + Math.random()*10,
        }));
        setPs(newPs);
        const t = setTimeout(() => setPs([]), 2600);
        return () => clearTimeout(t);
      }, [triggerKey]);

      return (
        <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
          {ps.map(p => (
            <span key={p.id} className="anim-note-float" style={{
              position:'absolute', bottom:'28%', left:`${p.x}%`,
              fontSize:p.size, color:'#f59e0b', opacity:.9,
              animationDelay:`${p.delay}s`
            }}>{p.ch}</span>
          ))}
        </div>
      );
    }

    function VinylDial({ value, onChange, loading }) {
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current?.focus(); }, []);
      const SIZE = 184;

      return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
          <p className="font-display" style={{fontSize:10,letterSpacing:'.25em',color:'rgba(245,158,11,.65)',textTransform:'uppercase',fontWeight:600}}>
            Starting Sound
          </p>

          <div style={{position:'relative',width:SIZE,height:SIZE}}>
            {loading && (
              <div className="anim-spin-fast" style={{
                position:'absolute', inset:-5, borderRadius:'50%',
                border:'2px solid transparent',
                borderTopColor:'#f59e0b',
                borderRightColor:'rgba(245,158,11,.25)'
              }}/>
            )}

            <div className={`vinyl-disc ${loading ? 'anim-spin-fast' : 'anim-spin-slow'}`} style={{
              width:SIZE, height:SIZE, borderRadius:'50%',
              boxShadow: value
                ? '0 0 0 3px #f59e0b, 0 0 46px rgba(245,158,11,.38), inset 0 0 24px rgba(0,0,0,.55)'
                : '0 0 0 2px rgba(245,158,11,.35), 0 0 18px rgba(245,158,11,.10), inset 0 0 24px rgba(0,0,0,.55)',
              transition:'box-shadow .4s ease',
              display:'flex', alignItems:'center', justifyContent:'center',
              animationDuration: loading ? '.85s' : '14s'
            }}>
              {[44,58,76,100].map(d => (
                <div key={d} style={{position:'absolute',width:d,height:d,borderRadius:'50%',border:'1px solid rgba(255,255,255,.05)'}}/>
              ))}
            </div>

            <div style={{
              position:'absolute', top:'50%', left:'50%',
              transform:'translate(-50%,-50%)',
              width:84, height:84, borderRadius:'50%',
              background:'radial-gradient(circle, #1c1840 0%, #0f0e28 100%)',
              boxShadow:'0 0 0 2px rgba(245,158,11,.45)',
              display:'flex', alignItems:'center', justifyContent:'center',
              zIndex:10
            }}>
              <input
                ref={inputRef}
                type="text" value={value} onChange={onChange}
                className="font-display"
                style={{
                  background:'transparent', border:'none', outline:'none',
                  color:'#fff', fontWeight:700, textAlign:'center',
                  width:'100%', caretColor:'#f59e0b', textTransform:'uppercase',
                  fontSize: value.length > 2 ? 26 : value.length > 1 ? 34 : 44,
                  textShadow: value ? '0 0 22px rgba(245,158,11,.85)' : 'none',
                  transition:'text-shadow .3s, font-size .15s'
                }}
                placeholder="…" autoComplete="off" spellCheck="false" maxLength={3}
              />
            </div>
          </div>

          <p style={{fontSize:11,color:'rgba(255,255,255,.3)',textAlign:'center'}}>
            Try&nbsp;<span style={{color:'#f59e0b'}}>SH</span>&nbsp;·&nbsp;<span style={{color:'#f59e0b'}}>KH</span>&nbsp;·&nbsp;<span style={{color:'#f59e0b'}}>BH</span>&nbsp;·&nbsp;<span style={{color:'#f59e0b'}}>TR</span>
          </p>
        </div>
      );
    }

    function QuickPick({ onSelect }) {
      return (
        <div>
          <p className="font-display" style={{fontSize:10,letterSpacing:'.2em',color:'rgba(255,255,255,.25)',textTransform:'uppercase',fontWeight:600,marginBottom:9}}>
            Quick Pick
          </p>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {QUICK_ALPHA.map(l => (
              <button key={l} onClick={() => onSelect(l)}
                className="glass glass-hover font-display"
                style={{width:32,height:28,borderRadius:8,fontSize:12,fontWeight:600,color:'rgba(255,255,255,.72)',cursor:'pointer',background:'rgba(255,255,255,.055)',border:'1px solid rgba(255,255,255,.10)',transition:'all .15s'}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:7}}>
            {DIGRAPHS.map(d => (
              <button key={d} onClick={() => onSelect(d)}
                className="font-display"
                style={{padding:'4px 9px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(245,158,11,.10)',border:'1px solid rgba(245,158,11,.26)',color:'#f59e0b',transition:'all .15s'}}>
                {d}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function FilterBar({ active, onChange }) {
      return (
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:3}} className="scroll-none">
          {FILTERS.map(f => (
            <button key={f.id} onClick={() => onChange(f.id)}
              className="font-display"
              style={{
                flexShrink:0, padding:'7px 13px', borderRadius:12,
                fontSize:12, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap',
                transition:'all .18s',
                background: active === f.id ? '#f59e0b'                    : 'rgba(255,255,255,.055)',
                color:      active === f.id ? '#1a0f00'                    : 'rgba(255,255,255,.65)',
                border:     active === f.id ? '1px solid #f59e0b'          : '1px solid rgba(255,255,255,.10)',
                boxShadow:  active === f.id ? '0 4px 18px rgba(245,158,11,.25)' : 'none',
              }}>
              {f.label}
            </button>
          ))}
        </div>
      );
    }


    function SongChain({ history }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) ref.current.scrollLeft = ref.current.scrollWidth;
      }, [history.length]);
      if (!history.length) return null;

      return (
        <div className="glass anim-fade-in" style={{borderRadius:16,padding:'11px 15px',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
            <span className="font-display" style={{fontSize:10,letterSpacing:'.2em',color:'rgba(255,255,255,.28)',textTransform:'uppercase',fontWeight:600}}>
              Song Chain · {history.length} played
            </span>
          </div>
          <div ref={ref} style={{display:'flex',alignItems:'center',gap:4,overflowX:'auto'}} className="scroll-none">
            {history.map((item,i) => (
              <React.Fragment key={i}>
                <div className="anim-badge-pop font-display" title={item.song} style={{
                  flexShrink:0, padding:'3px 10px', borderRadius:8,
                  fontSize:12, fontWeight:700,
                  background:'rgba(245,158,11,.14)', border:'1px solid rgba(245,158,11,.30)', color:'#f59e0b'
                }}>{item.letter.toUpperCase()}</div>
                <span style={{color:'rgba(255,255,255,.22)',fontSize:12,flexShrink:0}}>→</span>
              </React.Fragment>
            ))}
            <div className="font-display" style={{
              flexShrink:0, padding:'3px 10px', borderRadius:8,
              fontSize:12, fontWeight:700,
              background:'rgba(255,255,255,.05)', border:'1px dashed rgba(255,255,255,.20)', color:'rgba(255,255,255,.30)'
            }}>?</div>
          </div>
        </div>
      );
    }

    function SongCard({ song, index, expanded, onToggle, onUse, justUsed }) {
      const acc = ACCENT_META[index % ACCENT_META.length];

      return (
        <div
          className={`glass acc-${index % 5} anim-slide-up ${justUsed ? 'anim-used-flash' : ''}`}
          style={{
            borderRadius:16, overflow:'hidden', cursor:'pointer',
            animationDelay:`${index * .07}s`,
            background: expanded ? 'rgba(255,255,255,.09)' : 'rgba(255,255,255,.055)',
            transition:'background .25s',
          }}
          onClick={onToggle}
        >
          {/* Header */}
          <div style={{padding:'13px 15px',display:'flex',alignItems:'flex-start',gap:11}}>
            <div className="font-display" style={{
              width:36, height:36, borderRadius:10, flexShrink:0,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:14, fontWeight:700, color:acc.color, background:acc.bg,
              border:`1px solid ${acc.color}32`
            }}>{index+1}</div>

            <div style={{flex:1,minWidth:0}}>
              <h3 className="font-display" style={{
                fontSize:15, fontWeight:700, color:'#f8f7ff', marginBottom:2,
                lineHeight:1.3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
              }}>{song.title}</h3>
              <p style={{fontSize:12,color:'rgba(255,255,255,.48)',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {song.movie}
              </p>
              <p style={{fontSize:11,color:'rgba(255,255,255,.33)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {song.singer}
              </p>
            </div>

            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5,flexShrink:0}}>
              <span className="font-display" style={{
                fontSize:10, fontWeight:600, padding:'3px 7px', borderRadius:6,
                background:acc.bg, color:acc.color, border:`1px solid ${acc.color}2e`
              }}>{song.language}</span>
              <span style={{fontSize:10,color:'rgba(255,255,255,.28)',padding:'2px 6px',borderRadius:5,background:'rgba(255,255,255,.05)'}}>
                {song.era}
              </span>
            </div>
          </div>

          {/* Lyrics (expanded) */}
          {expanded && (
            <div className="anim-fade-in" style={{padding:'0 15px 15px',borderTop:'1px solid rgba(255,255,255,.08)'}}
              onClick={e => e.stopPropagation()}>
              <div className="scroll-thin" style={{paddingTop:12,display:'flex',flexDirection:'column',gap:7, maxHeight: '45vh', overflowY: 'auto', paddingRight: '8px'}}>
                {song.lyrics.map((line, li) => {
                  const isLast = li === song.lyrics.length - 1;
                  if (isLast) {
                    const idx = line.search(/[a-zA-Z](?=[^a-zA-Z]*$)/);
                    return (
                      <p key={li} style={{fontSize:13,lineHeight:1.65,fontWeight:500,color:'rgba(255,255,255,.92)'}}>
                        {idx >= 0
                          ? <>{line.slice(0,idx)}<span className="anim-glow-blink" style={{fontWeight:800,fontSize:15}}>{line.slice(idx)}</span></>
                          : line}
                      </p>
                    );
                  }
                  return <p key={li} style={{fontSize:13,lineHeight:1.65,color:'rgba(255,255,255,.48)'}}>{line}</p>;
                })}
              </div>

              {/* Bottom action bar */}
              <div style={{marginTop:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,color:'rgba(255,255,255,.32)'}}>Next →</span>
                  <div className="font-display" style={{
                    width:32, height:32, borderRadius:8,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:14, fontWeight:800,
                    background:'rgba(244,63,94,.15)', color:'#f43f5e',
                    border:'1px solid rgba(244,63,94,.30)'
                  }}>{(song.end_letter||'?').toUpperCase()}</div>
                </div>
                <button onClick={e => { e.stopPropagation(); onUse(song); }}
                  className="font-display"
                  style={{
                    padding:'8px 16px', borderRadius:10, fontSize:12, fontWeight:600,
                    cursor:'pointer', transition:'all .18s',
                    background:'rgba(245,158,11,.20)', color:'#f59e0b',
                    border:'1px solid rgba(245,158,11,.36)'
                  }}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(245,158,11,.30)'}
                  onMouseLeave={e => e.currentTarget.style.background='rgba(245,158,11,.20)'}>
                  ✓ Use This Song
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SkeletonCard({ delay }) {
      return (
        <div className="glass" style={{borderRadius:16,padding:15,display:'flex',gap:11,animationDelay:`${delay}s`}}>
          <div className="shimmer-block" style={{width:36,height:36,borderRadius:10,flexShrink:0}}/>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
            <div className="shimmer-block" style={{height:14,width:'68%',borderRadius:6}}/>
            <div className="shimmer-block" style={{height:11,width:'50%',borderRadius:6}}/>
            <div className="shimmer-block" style={{height:10,width:'36%',borderRadius:6}}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}>
            <div className="shimmer-block" style={{height:22,width:52,borderRadius:6}}/>
            <div className="shimmer-block" style={{height:18,width:44,borderRadius:5}}/>
          </div>
        </div>
      );
    }

    function EmptyState({ hasInput }) {
      return (
        <div className="anim-fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'70px 24px',textAlign:'center',gap:12}}>
          <span style={{fontSize:54,opacity:.18,lineHeight:1}}>🎵</span>
          <p className="font-display" style={{fontSize:17,fontWeight:700,color:'rgba(255,255,255,.24)'}}>
            {hasInput ? 'No songs found' : 'Ready to find songs'}
          </p>
          <p style={{fontSize:13,color:'rgba(255,255,255,.17)',lineHeight:1.7,maxWidth:310}}>
            {hasInput
              ? 'Try a different genre filter, or hit "Different suggestions" to ask the AI again.'
              : 'Type a letter or digraph in the record above, or tap a Quick Pick button. The AI suggests 6 real songs for any sound.'}
          </p>
        </div>
      );
    }


    /* ─── Main App ───────────────────────────────────────────────────────────── */

    function App() {
      const [input,     setInput]     = useState('');
      const [songs,     setSongs]     = useState([]);
      const [loading,   setLoading]   = useState(false);
      const [error,     setError]     = useState('');
      const [filter,    setFilter]    = useState('all');
      const [expanded,  setExpanded]  = useState(null);
      const [history,   setHistory]   = useState([]);
      const [noteKey,   setNoteKey]   = useState(0);
      const [lastUsed,  setLastUsed]  = useState(null);
      const [expectedLetter, setExpectedLetter] = useState('');
      const debounceRef = useRef(null);

      /* Input handler */
      const handleInput = e => {
        const v = e.target.value.replace(/[^a-zA-Z]/g,'').slice(0,3).toUpperCase();
        setInput(v);
        setExpectedLetter(''); // Clear hint once they start typing
        setExpanded(null);
      };

      const handleQuickPick = l => { 
        setInput(l); 
        setExpectedLetter(''); 
        setExpanded(null); 
      };

      /* Load songs */
      const loadSongs = useCallback(async (snd, f) => {
        if (!snd) { setSongs([]); return; }
        setLoading(true);
        setError('');
        setSongs([]);
        setExpanded(null);
        try {
          const data = await callGeminiForSongs(snd, f);
          setSongs(data.songs || []);
          setNoteKey(k => k + 1);
        } catch(err) {
          console.error(err);
          setError('Could not load songs — please try again.');
        } finally {
          setLoading(false);
        }
      }, []);

      /* Debounced trigger */
      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => loadSongs(input.toLowerCase(), filter), 680);
        return () => clearTimeout(debounceRef.current);
      }, [input, filter, loadSongs]);

      /* Auto-hide error */
      useEffect(() => {
        if (!error) return;
        const t = setTimeout(() => setError(''), 4500);
        return () => clearTimeout(t);
      }, [error]);

      /* Use song → advance game */
      const handleUseSong = song => {
        setHistory(prev => [...prev, { letter:input, song:song.title, end:song.end_letter }]);
        setLastUsed(song.title);
        setTimeout(() => setLastUsed(null), 700);
        
        // Let the user input the next letter manually
        if (song.end_letter) setExpectedLetter(song.end_letter.toUpperCase());
        setInput('');
        setSongs([]);
        setExpanded(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        if (navigator.vibrate) navigator.vibrate(40);
      };

      const resetGame = () => { setHistory([]); setInput(''); setSongs([]); setExpectedLetter(''); setExpanded(null); };

      const uniqueLetters = [...new Set(history.map(h => h.letter))].length;

      return (
        <div className="app-bg">

          {/* Toast */}
          {error && (
            <div className="anim-slide-up font-display" style={{
              position:'fixed', top:14, left:'50%', transform:'translateX(-50%)',
              zIndex:200, padding:'10px 20px', borderRadius:22,
              background:'rgba(244,63,94,.92)', color:'#fff', fontSize:13, fontWeight:600,
              boxShadow:'0 8px 30px rgba(244,63,94,.42)', whiteSpace:'nowrap'
            }}>⚠ {error}</div>
          )}

          <div style={{padding:'26px 16px 50px'}}>

            {/* ── Header ── */}
            <div style={{textAlign:'center',marginBottom:26}}>
              <p className="font-display" style={{fontSize:10,letterSpacing:'.3em',color:'rgba(245,158,11,.62)',textTransform:'uppercase',fontWeight:600,marginBottom:6}}>
                AI-Powered · Unlimited Songs
              </p>
              <h1 className="font-display" style={{fontSize:38,fontWeight:700,letterSpacing:'-.03em',color:'#f8f7ff',lineHeight:1,textShadow:'0 0 80px rgba(245,158,11,.18)'}}>
                Antakshari Engine
              </h1>
              <p style={{fontSize:12,color:'rgba(255,255,255,.24)',marginTop:6}}>
                Powered by Gemini · Every letter · Every genre · Infinite rounds
              </p>
            </div>

            {/* ── Mobile-First Linear Layout ── */}
            <div style={{display:'flex', flexDirection:'column', gap:18, maxWidth: 540, margin: '0 auto'}}>

              {/* ── Song chain ── */}
              <SongChain history={history} />

              {/* Vinyl dial & Input */}
              <div className="glass" style={{borderRadius:24,padding:'22px 18px',position:'relative',overflow:'hidden'}}>
                <NoteParticles triggerKey={noteKey} />
                
                {expectedLetter && (
                  <div className="anim-badge-pop font-display" style={{textAlign:'center', marginBottom: 16}}>
                    <span style={{fontSize: 12, color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase', letterSpacing: '0.1em'}}>Your Turn! Type sound:</span>
                    <div style={{fontSize: 28, fontWeight: 800, color: '#f59e0b', textShadow: '0 0 16px rgba(245,158,11,0.5)'}}>
                      {expectedLetter}
                    </div>
                  </div>
                )}
                
                <VinylDial value={input} onChange={handleInput} loading={loading} />
              </div>

              {/* Quick pick */}
              <div className="glass" style={{borderRadius:20,padding:'15px 15px 13px'}}>
                <QuickPick onSelect={handleQuickPick} />
              </div>

              {/* Genre filter */}
              <div className="glass" style={{borderRadius:20,padding:'14px 15px'}}>
                <p className="font-display" style={{fontSize:10,letterSpacing:'.2em',color:'rgba(255,255,255,.26)',textTransform:'uppercase',fontWeight:600,marginBottom:10}}>Genre</p>
                <FilterBar active={filter} onChange={f => { setFilter(f); setExpanded(null); }} />
              </div>

              {/* Search Results Area */}
              <div>
                {/* Top bar */}
                {songs.length > 0 && !loading && (
                  <div className="anim-fade-in" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,padding:'0 3px'}}>
                    <p style={{fontSize:12,color:'rgba(255,255,255,.33)'}}>
                      <span className="font-display" style={{color:'#f59e0b',fontWeight:700}}>{songs.length} songs</span>
                      {' '}for{' '}
                      <span className="font-display" style={{color:'#f59e0b',fontWeight:700}}>{input}</span>
                    </p>
                    <button onClick={() => loadSongs(input.toLowerCase(), filter)}
                      className="font-display"
                      style={{fontSize:12,fontWeight:600,cursor:'pointer',background:'none',border:'none',color:'rgba(255,255,255,.3)',padding:'4px 8px',borderRadius:8,transition:'color .18s'}}
                      onMouseEnter={e => e.currentTarget.style.color='#f59e0b'}
                      onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,.3)'}>
                      ↻ Different suggestions
                    </button>
                  </div>
                )}

                {/* Content */}
                {loading ? (
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {[0,.1,.2,.3,.4,.5].map((d,i) => <SkeletonCard key={i} delay={d}/>)}
                  </div>
                ) : songs.length > 0 ? (
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {songs.map((song,i) => (
                      <SongCard
                        key={`${song.title}-${i}`}
                        song={song} index={i}
                        expanded={expanded === i}
                        onToggle={() => setExpanded(expanded === i ? null : i)}
                        onUse={handleUseSong}
                        justUsed={lastUsed === song.title}
                      />
                    ))}
                  </div>
                ) : (
                  <EmptyState hasInput={!!input}/>
                )}
              </div>

              {/* Stats (game in progress) */}
              {history.length > 0 && (
                <div className="glass anim-fade-in" style={{borderRadius:20,padding:'15px 15px 13px', marginTop: 12}}>
                  <p className="font-display" style={{fontSize:10,letterSpacing:'.2em',color:'rgba(255,255,255,.26)',textTransform:'uppercase',fontWeight:600,marginBottom:12}}>Game Stats</p>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                    {[
                      {label:'Songs Sung',   val:history.length, clr:'#f59e0b'},
                      {label:'Letters Used', val:uniqueLetters,  clr:'#f43f5e'},
                    ].map(s => (
                      <div key={s.label} style={{textAlign:'center',padding:'10px 8px',borderRadius:12,background:'rgba(255,255,255,.05)'}}>
                        <p className="font-display" style={{fontSize:26,fontWeight:700,color:s.clr,lineHeight:1}}>{s.val}</p>
                        <p style={{fontSize:10,color:'rgba(255,255,255,.32)',marginTop:4}}>{s.label}</p>
                      </div>
                    ))}
                  </div>
                  <button onClick={resetGame} className="font-display glass-hover"
                    style={{width:'100%',padding:'8px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.10)',color:'rgba(255,255,255,.38)',transition:'all .18s'}}>
                    Reset Game
                  </button>
                </div>
              )}

              {/* How to play (Only show if no songs and no history to save space) */}
              {songs.length === 0 && history.length === 0 && !loading && (
                <div className="glass anim-fade-in" style={{borderRadius:20,padding:'14px 15px'}}>
                  <p className="font-display" style={{fontSize:10,letterSpacing:'.2em',color:'rgba(255,255,255,.26)',textTransform:'uppercase',fontWeight:600,marginBottom:10}}>How to Play</p>
                  {[
                    ['1','Type a letter or pick one above'],
                    ['2','Browse AI-suggested songs'],
                    ['3','Click a card to see its lyrics'],
                    ['4','Hit "Use This Song" to lock it in'],
                    ['5','Manually type the next trailing letter to continue!'],
                  ].map(([n, txt]) => (
                    <div key={n} style={{display:'flex',gap:9,marginBottom:8,alignItems:'flex-start'}}>
                      <span className="font-display" style={{fontSize:11,fontWeight:700,color:'rgba(245,158,11,.6)',flexShrink:0,marginTop:1}}>{n}</span>
                      <span style={{fontSize:12,color:'rgba(255,255,255,.42)',lineHeight:1.5}}>{txt}</span>
                    </div>
                  ))}
                </div>
              )}

            </div>

            <p style={{textAlign:'center',marginTop:44,fontSize:11,color:'rgba(255,255,255,.13)'}}>
              Antakshari Engine · Powered by Gemini AI · 2026
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
